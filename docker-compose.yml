services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /work/runs
      RUN_MODE: in-process
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MAX_REPO_MB: 500
      MAX_RUN_SECONDS: 600
    volumes:
      - runs-data:/work/runs

volumes:
  runs-data:
